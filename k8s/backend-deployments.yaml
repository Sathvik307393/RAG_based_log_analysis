apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: log-analysis
  labels:
    app: auth-service
    tier: private
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        tier: private
    spec:
      imagePullSecrets:
      - name: acr-pull-secret
      containers:
      - name: auth-service
        image: loganalysisregistry.azurecr.io/autohub-auth-service:latest
        ports:
        - containerPort: 8000
        env:
        - name: PORT
          value: "8000"
        - name: MONGODB_URI
          value: "mongodb://admin:secure_db_pass@aws-db-service.log-analysis.svc.cluster.local:27017/autohub?authSource=admin"
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: log-analysis
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
  selector:
    app: auth-service

---

