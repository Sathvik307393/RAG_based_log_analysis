apiVersion: apps/v1
kind: Deployment
metadata:
  name: autohub-frontend
  namespace: log-analysis
  labels:
    app: autohub-frontend
    tier: public
spec:
  replicas: 1
  selector:
    matchLabels:
      app: autohub-frontend
  template:
    metadata:
      labels:
        app: autohub-frontend
        tier: public
    spec:
      imagePullSecrets:
      - name: acr-pull-secret
      containers:
      - name: frontend
        image: loganalysisregistry.azurecr.io/autohub-frontend:latest
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: "150m"
            memory: "128Mi"
          requests:
            cpu: "50m"
            memory: "64Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: log-analysis
  labels:
    app: autohub-frontend
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: autohub-frontend
