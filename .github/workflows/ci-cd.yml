name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  ACR_NAME: autohubacr
  AKS_CLUSTER: autohub-aks
  RESOURCE_GROUP: autohub-rg
  TARGET_DOMAIN: https://your-domain.com # Configured for DAST targeting your custom domain

jobs:
  lint-and-test:
    name: Lint & Unit Testing
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-value: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings.
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  sast-snyk:
    name: Snyk Dependency & SAST Scan
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Run Snyk to check for vulnerabilities
      uses: snyk/actions/python@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        command: monitor # Monitor dependencies for vulnerability disclosure

  sast-sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@v2
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  build-and-trivy-scan:
    name: Container Build & Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    needs: [sast-snyk, sast-sonarqube]
    strategy:
      matrix:
        service: [gateway, frontend, auth-service, inventory-service, metrics-service]
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Service Container
      run: |
        docker build -t ${{ env.ACR_NAME }}.azurecr.io/autohub-${{ matrix.service }}:${{ github.sha }} -f services/${{ matrix.service }}/Dockerfile services/${{ matrix.service }}/

    - name: Run Trivy Vulnerability Scanner (Image Scan)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: '${{ env.ACR_NAME }}.azurecr.io/autohub-${{ matrix.service }}:${{ github.sha }}'
        format: 'table'
        exit-code: '1' # Fail pipeline on severe vulnerabilities
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

  deploy-dry-run:
    name: Kubernetes Deploy Dry Run
    runs-on: ubuntu-latest
    needs: build-and-trivy-scan
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Kubeval (K8s Manifest Validator)
      run: |
        wget https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz
        tar xf kubeval-linux-amd64.tar.gz
        sudo cp kubeval /usr/local/bin

    - name: Lint Kubernetes Manifests
      run: |
        kubeval k8s/*.yaml

  dast-scan:
    name: Dynamic Application Security Scan (DAST)
    runs-on: ubuntu-latest
    needs: deploy-dry-run
    steps:
    - name: Run OWASP ZAP Baseline Scan
      uses: zaproxy/action-baseline@v0.12.0
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        target: ${{ env.TARGET_DOMAIN }}
        rules_file_name: '.zap/rules.tsv'
        cmd_options: '-a'
