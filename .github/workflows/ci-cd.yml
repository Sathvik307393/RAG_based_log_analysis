name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  ACR_NAME: loganalysisregistrysrev2
  AKS_CLUSTER: log-analysis-cluster
  RESOURCE_GROUP: log-analysis-rg
  TARGET_DOMAIN: https://your-domain.com # Configured for DAST targeting your custom domain

jobs:
  lint-and-test:
    name: Lint & Unit Testing
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-value: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings.
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  sast-snyk:
    name: Snyk Dependency & SAST Scan
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Run Snyk to check for vulnerabilities
      uses: snyk/actions/python@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        command: monitor # Monitor dependencies for vulnerability disclosure
# 
#   sast-sonarqube:
#     name: SonarQube Analysis
#     runs-on: ubuntu-latest
#     needs: lint-and-test
#     steps:
#     - name: Checkout Code
#       uses: actions/checkout@v4
#       with:
#         fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
# 
#     - name: SonarQube Scan
#       uses: SonarSource/sonarqube-scan-action@v2
#       env:
#         SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
#         SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  build-and-push:
    name: Container Build & Push
    runs-on: ubuntu-latest
    needs: [lint-and-test, sast-snyk] # Skipped sast-sonarqube
    strategy:
      matrix:
        service: [gateway, frontend, auth-service, inventory-service, metrics-service, maintenance-service, valuation-service, fuel-service, insurance-service]
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: ${{ env.ACR_NAME }}.azurecr.io
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and Push Service Container
      run: |
        docker build -t ${{ env.ACR_NAME }}.azurecr.io/autohub-${{ matrix.service }}:${{ github.sha }} -t ${{ env.ACR_NAME }}.azurecr.io/autohub-${{ matrix.service }}:latest -f services/${{ matrix.service }}/Dockerfile services/${{ matrix.service }}/
        docker push ${{ env.ACR_NAME }}.azurecr.io/autohub-${{ matrix.service }}:${{ github.sha }}
        docker push ${{ env.ACR_NAME }}.azurecr.io/autohub-${{ matrix.service }}:latest

    - name: Run Trivy Vulnerability Scanner (Image Scan)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: '${{ env.ACR_NAME }}.azurecr.io/autohub-${{ matrix.service }}:${{ github.sha }}'
        format: 'table'
        exit-code: '0' # Log vulnerabilities but do not fail the build
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

  deploy-dry-run:
    name: Kubernetes Deploy Dry Run
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Kubeconform (K8s Manifest Validator)
      run: |
        wget https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
        tar xf kubeconform-linux-amd64.tar.gz
        sudo cp kubeconform /usr/local/bin

    - name: Lint Kubernetes Manifests
      run: |
        kubeconform -summary k8s/

#   dast-scan:
#     name: Dynamic Application Security Scan (DAST)
#     runs-on: ubuntu-latest
#     needs: deploy-dry-run
#     steps:
#     - name: Run OWASP ZAP Baseline Scan
#       uses: zaproxy/action-baseline@v0.12.0
#       with:
#         token: ${{ secrets.GITHUB_TOKEN }}
#         target: ${{ env.TARGET_DOMAIN }}
#         rules_file_name: '.zap/rules.tsv'
#         cmd_options: '-a'

  notify-on-failure:
    name: Send Email on Failure
    runs-on: ubuntu-latest
    needs: [lint-and-test, sast-snyk, build-and-push, deploy-dry-run] # Removed sast-sonarqube, dast-scan
    if: failure()  # Only runs if any of the needed jobs fail
    steps:
    - name: Fetch Failed Job Logs
      run: |
        echo "ERRORS<<EOF" >> $GITHUB_ENV
        gh run view ${{ github.run_id }} --log-failed | tail -n 40 >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Send Failure Email
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        subject: "🚨 Alert: CI/CD Pipeline Failed - ${{ github.repository }}"
        body: |
          Hello SRE Team,

          The CI/CD pipeline for ${{ github.repository }} has FAILED!

          --------------------------------------------------
          🚨 RECENT ERROR LOG SNIPPET:
          --------------------------------------------------
          ${{ env.ERRORS }}
          --------------------------------------------------

          Details:
          - Repository: https://github.com/${{ github.repository }}
          - Workflow Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          - Branch: ${{ github.ref_name }}
          - Actor: ${{ github.actor }}
          - Commit SHA: ${{ github.sha }}

          Please inspect the logs and resolve the issue.

          Regards,
          AutoHub DevSecOps Guardrail System
        to: sathvik.vbn@gmail.com
        from: DevSecOps Automated Alerts <${{ secrets.MAIL_USERNAME }}>
